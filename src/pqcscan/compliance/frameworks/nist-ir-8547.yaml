framework: nist-ir-8547
title: NIST IR 8547 — Transition to Post-Quantum Cryptography Standards
# Deprecation milestones: NIST defines RSA <2048 deprecated immediately,
# RSA-2048 / ECDSA-P256 deprecated after 2030, all classical pre-quantum
# disallowed after 2035.
rules:
  - match: { algorithm: RSA, key_size_lt: 2048 }
    clause: NIST-IR-8547:RSA-disallowed
    verdict: non-compliant
    note: "RSA <2048 disallowed — migrate immediately."
  - match: { algorithm: RSA, key_size_lt: 3072 }
    clause: NIST-IR-8547:RSA-deprecated-2030
    verdict: at-risk
    deadline: 2030-12-31
    note: "RSA-2048 deprecated after 2030; transition to PQC by 2035."
  - match: { algorithm: ECDSA }
    clause: NIST-IR-8547:ECDSA-deprecated-2030
    verdict: at-risk
    deadline: 2030-12-31
    note: "ECDSA over P-256 / P-384 deprecated after 2030 for federal systems."
  - match: { algorithm: SHA-1 }
    clause: NIST-IR-8547:SHA1-disallowed
    verdict: non-compliant
    note: "SHA-1 disallowed for digital signatures (NIST SP 800-131A Rev 2)."
  - match: { algorithm: MD5 }
    clause: NIST-IR-8547:MD5-disallowed
    verdict: non-compliant
  - match: { algorithm: ML-KEM }
    clause: NIST-IR-8547:KEM-approved
    verdict: compliant
    note: "ML-KEM (FIPS 203) is the approved PQC KEM."
  - match: { algorithm: ML-DSA }
    clause: NIST-IR-8547:DSA-approved
    verdict: compliant
    note: "ML-DSA (FIPS 204) is the approved PQC signature scheme."
  - match: { algorithm: SLH-DSA }
    clause: NIST-IR-8547:SLH-DSA-approved
    verdict: compliant
    note: "SLH-DSA (FIPS 205) is the approved hash-based signature."
