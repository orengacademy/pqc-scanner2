# Accuracy-benchmark corpus manifest.
#
# Each entry is one labelled case:
#   id     — unique case id
#   probe  — probe id under test (must resolve in default_registry())
#   kind   — 'positive' (probe SHOULD fire) | 'negative' (probe should NOT fire)
#   input  — path relative to benchmark/corpus/ (a file OR a directory)
#   expect — optional, positive-only refinements:
#              algorithm_contains — case-insensitive substring on a fired
#                                    finding.algorithm
#              min_severity       — at least one fired finding >= this severity
#                                    (info<low<med<high<crit)
#
# "Fired" = the probe emitted at least one REAL detection, i.e. a finding whose
# classification is one of {sangat-tinggi, tinggi, sederhana, rendah}. INFO /
# ERROR / PQC_READY markers are platform/skip/ready notes, not detections, and
# never count as a fire (see benchmark/README.md, "real detection" rule).
#
# Source-code probes (code.ts.*) walk a directory tree, so each code case is a
# directory holding one source file. F5/NetScaler/nginx/haproxy/sshd config
# probes and fs.db.crypto accept a single file directly.
#
# Probes deliberately NOT in the corpus: any probe that needs a live network
# socket (net.*), a running daemon, or host-only artefacts (host.*) — they
# cannot be pointed at a static fixture. This corpus targets the precision-
# sensitive offline probes (AST/regex source scan, config parsers, cert/DB
# parsers).

# ---- code.ts.python (stdlib-ast engine) ---------------------------------
- id: py-md5-real
  probe: code.ts.python
  kind: positive
  input: cases/py-md5-real
  expect:
    algorithm_contains: MD5
    min_severity: crit
- id: py-sha1-alias
  probe: code.ts.python
  kind: positive
  input: cases/py-sha1-alias
  expect:
    algorithm_contains: SHA1
- id: py-rsa2048
  probe: code.ts.python
  kind: positive
  input: cases/py-rsa2048
  expect:
    algorithm_contains: RSA
    min_severity: crit
- id: py-des-real
  probe: code.ts.python
  kind: positive
  input: cases/py-des-real
  expect:
    algorithm_contains: DES
- id: py-ec-real
  probe: code.ts.python
  kind: positive
  input: cases/py-ec-real
  expect:
    algorithm_contains: EC
- id: py-comment-md5      # weak token in a comment only
  probe: code.ts.python
  kind: negative
  input: cases/py-comment-md5
- id: py-string-md5       # weak token in a string literal only
  probe: code.ts.python
  kind: negative
  input: cases/py-string-md5
- id: py-clean-sha256     # strong hash — must not be flagged weak
  probe: code.ts.python
  kind: negative
  input: cases/py-clean-sha256

